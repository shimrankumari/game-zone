<!DOCTYPE html>
<html>
<head>
  <title>Dino Game 🦖</title>

  <style>
    body {
      background: #111;
      text-align: center;
      color: white;
      font-family: Arial;
    }

    h1 {
      margin-top: 20px;
    }

    .game {
      width: 400px;
      height: 200px;
      border: 2px solid white;
      margin: 40px auto;
      position: relative;
      overflow: hidden;
    }

    /* 🦖 DINO */
    .player {
      width: 60px;
      height: 60px;
      background: url("clipart3004247.png") no-repeat center;
      background-size: contain;
      position: absolute;
      bottom: 0;
      left: 50px;
    }

.obstacle {
  width: 50px;
  height: 70px;
background-image: url("cactus.png");
  background-size: contain;
  position: absolute;
  bottom: 0;
  right: 0;
  animation: move 4s linear infinite;  
}
    }

    @keyframes move {
      from { right: -20px; }
      to { right: 420px; }
    }

    /* ⬆️ JUMP */
    .jump {
      animation: jump 0.8s;
    }

    @keyframes jump {
      0% { bottom: 0; }
     40% { bottom: 130px; }
     60% { bottom: 130px; }
      100% { bottom: 0; }
    }

    /* ⭐ SCORE */
    #scoreBox {
      margin-top: 10px;
      font-size: 20px;
    }

  </style>
</head>

<body>

<h1>🦖 Dino Game</h1>

<div id="scoreBox">Score: <span id="score">0</span></div>

<div class="game">
  <div class="player" id="player"></div>
  <div class="obstacle" id="obstacle"></div>
</div>

<p>⬆️ Arrow = Jump | SPACE = Restart</p>

<script>
let player = document.getElementById("player");
let obstacle = document.getElementById("obstacle");
let score = 0;

let isJumping = false;
let isGameOver = false;

// SCORE
let scoreInterval = setInterval(() => {
  if (!isGameOver) {
    score++;
    document.getElementById("score").innerText = score;
  }
}, 200);

// KEY CONTROL
document.addEventListener("keydown", function(e) {

  // Restart
  if (isGameOver && e.code === "Space") {
    location.reload();
  }

  // Jump
  if (e.key === "ArrowUp" && !isJumping && !isGameOver) {
    isJumping = true;
    player.classList.add("jump");

    setTimeout(() => {
      player.classList.remove("jump");
      isJumping = false;
    }, 1000);
  }
});

// COLLISION
let gameLoop = setInterval(() => {

  if (isGameOver) return;

  let playerBottom = parseInt(window.getComputedStyle(player).getPropertyValue("bottom"));
  let obstacleLeft = parseInt(window.getComputedStyle(obstacle).getPropertyValue("left"));

  if (obstacleLeft > 60 && obstacleLeft < 90 && playerBottom < 30) {

    isGameOver = true;

    document.querySelector(".game").innerHTML =
      "<h2>💥 Game Over</h2><p>Score: " + score + "</p><p>Press SPACE to Restart</p>";

  }

}, 10);
</script>

</body>
</html>
